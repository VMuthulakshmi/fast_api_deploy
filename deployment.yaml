apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app-service
  labels:
    app: fastapi-app-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-app-service
  template:
    metadata:
      labels:
        app: fastapi-app-service
    spec:
      containers:
        - name: fastapi-app-service
          image: pearllakhs/fast_api:8c79f7a8df49b4fbb1f2185804ae54d41500fca4
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

 